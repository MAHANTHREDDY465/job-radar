name: morning-radar

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 08:30 IST, daily
  workflow_dispatch: {}     # manual "Run workflow" button
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'           # the bot's own snapshot commits (docs/) must NOT re-trigger it

permissions:
  contents: write

concurrency:
  group: morning-radar
  cancel-in-progress: false

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Resume profile comes from a secret — it is never committed to the repo.
      - name: Write resume profile (secret)
        env:
          RESUME_PROFILE: ${{ secrets.RESUME_PROFILE }}
        run: |
          mkdir -p data
          if [ -n "$RESUME_PROFILE" ]; then
            printf '%s' "$RESUME_PROFILE" > data/resume-profile.json
            echo "resume profile loaded"
          else
            echo "::warning::RESUME_PROFILE secret not set — jobs will not be fit-scored"
          fi

      - name: Scrape + score jobs
        env:
          JR_PUBLIC: '1'
        run: node lib/scrape.js

      - name: Publish snapshot to Pages folder
        run: |
          cp data/jobs.json docs/jobs.json
          cp public/style.css docs/style.css

      - name: Commit snapshot
        run: |
          git config user.name  "job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/jobs.json docs/style.css
          git commit -m "morning snapshot $(date -u +%F)" || echo "no changes"
          git push

      - name: Telegram digest
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: node tools/notify-digest.js
